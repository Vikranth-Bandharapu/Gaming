<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Register Stackly Gaming Account - Select your starting sector and create your neural cadet credentials.">
    <title>STACKLY PLAY // Operational Cadet Registration</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <!-- AOS Stylesheet -->
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="cyber-dark-theme auth-page-body">
    <!-- Background Particles -->
    <div class="preloader-particles"></div>
    
    <div class="login-card-container signup-mode" data-aos="zoom-in" style="max-width: 540px;">
        <div class="card-glow-border"></div>
        <div class="card-inner" style="padding: 2.5rem 3rem;">
            
            <div class="login-header" style="text-align: center; margin-bottom: 2rem;">
                <a href="index.html" class="nav-logo" style="font-size: 2rem; display: flex; justify-content: center; margin-bottom: 0.5rem;">
                    <img src="Assests/logo.webp" alt="Stackly Play Logo">
                </a>
                <span class="panel-tag" style="color: var(--accent-purple)">REGISTER OPERATIONAL CADET</span>
            </div>
            
            <!-- Form -->
            <form id="cyber-signup-form">
                <div class="form-row-2">
                    <div class="form-group">
                        <label for="cadet-fullname">FULL NAME *</label>
                        <input type="text" id="cadet-fullname" placeholder="Agent Full Name" required>
                    </div>
                    <div class="form-group">
                        <label for="cadet-username">CADET CODENAME *</label>
                        <input type="text" id="cadet-username" placeholder="e.g. AGENT_NEON" required>
                    </div>
                </div>
                
                <div class="form-row-2">
                    <div class="form-group">
                        <label for="cadet-email">NEURAL EMAIL ADDRESS *</label>
                        <input type="email" id="cadet-email" placeholder="cadet@neural.net" required>
                    </div>
                    <div class="form-group">
                        <label for="cadet-phone">NEURAL PHONE NUMBER *</label>
                        <input type="tel" id="cadet-phone" placeholder="e.g. +1 (555) 0199" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                        <label for="cadet-key" style="margin-bottom: 0;">CREATE ACCESS KEY *</label>
                    </div>
                    <div class="password-input-wrapper">
                        <input type="password" id="cadet-key" placeholder="Min. 8 characters" required>
                        <button type="button" class="password-toggle-btn" aria-label="Toggle Password Visibility">
                            <svg class="eye-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="pointer-events: none;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="cadet-key-confirm">CONFIRM ACCESS KEY *</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="cadet-key-confirm" placeholder="Repeat Access Key" required>
                        <button type="button" class="password-toggle-btn" aria-label="Toggle Password Visibility">
                            <svg class="eye-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="pointer-events: none;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="btn-primary-neon" style="width: 100%; text-align: center; border: none; padding: 1rem; font-size: 0.9rem; letter-spacing: 0.08em; cursor: pointer; display: block; margin-top: 2rem;">COMMENCE DEPLOYMENT</button>
            </form>
            
            <div class="login-footer" style="text-align: center; margin-top: 2rem; font-size: 0.875rem; color: var(--text-muted); border-top: 1px solid rgba(255,255,255,0.03); padding-top: 1.25rem;">
                Already logged in the roster? <a href="login.html" class="auth-link-nowrap" style="color: var(--accent-purple); font-weight: 700;">Login here &rarr;</a>
                <br><br>
                <a href="index.html" style="font-family: var(--font-cyber-console); font-size: 0.75rem; color: var(--text-muted);">&larr; Return to Node Core</a>
            </div>
        </div>
    </div>
    
    <!-- Main JavaScript Logic -->
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script src="app.js"></script>
</body>
</html>
